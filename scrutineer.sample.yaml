# Sample scrutineer config. Copy to scrutineer.yaml (in the working
# directory) or point at it with -config to activate.
#
# Every key is optional. Command-line flags always win; only values the
# user did NOT pass on the command line are taken from here.
#
# Paths that point at the host filesystem — data, skills, profiles_dir,
# recipients_file and identity_file — may begin with ~ to mean your home
# directory. (metadata_dir is a path inside the staging repo, not the host,
# so ~ is left as-is there.)

# Listen address for the web UI + skill API.
# addr: 127.0.0.1:8080

# Where scan workspaces and the sqlite DB live.
# data: ./data

# Claude effort level for model-backed skills.
# effort: high

# Clone strategy. "shallow" (default) clones with --depth 1; "full"
# clones the entire history. Switching from shallow to full unshallows
# existing clones on next scan. Full clones use significantly more disk
# and are slower for large repos — only flip if a skill needs history.
# clone: shallow

# Local directories to load SKILL.md files from. Repeatable via -skills
# on the command line; here you can list them directly.
# skills:
#   - ./skills

# Clone a skills repo on startup and load it. Accepts either an https URL or
# an "owner/repo" shorthand expanded to https://github.com/owner/repo. An
# optional "@ref" pins a branch, tag or commit; the resolved SHA is recorded
# on every scan so two runs a week apart can be told apart.
# skills_repo: https://github.com/alpha-omega-security/scrutineer-skills
# skills_repo: alpha-omega-security/scrutineer-skills@v0.3.1

# Container runtime: docker (default), podman, or Apple's container runtime
# (`apple`, experimental). Rootless podman is detected automatically and
# gets --userns=keep-id so scan output stays host-owned; podman >= 4.7 and an
# /etc/subuid range are required. There is no auto-detection -- a non-docker
# host must set this explicitly. Apple's container runtime (experimental)
# supports ordinary and --hardened scans; --hardened-runtime-only is a
# rootless-podman concept and is refused there. See docs/apple.md.
# runtime: docker

# SELinux bind-mount relabeling for the container runner. "auto" (default) adds
# ":z" to the runner's bind mounts only when SELinux is detected on the host
# (the Fedora/RHEL/Rocky/Alma default), so the container can read the clone and
# write its output; without it every scan fails with permission errors on such
# hosts. "on" forces it; "off" disables it (set this if you pre-label the data
# dir yourself). Non-SELinux hosts are unaffected either way. A startup smoke
# test verifies a real relabeled mount works. See docs/podman.md.
# selinux: auto

# Disable the container runner even if a runtime is available on the host;
# claude then runs directly on the host with no isolation. (no_docker is the
# retained back-compat alias for this key.)
# no_container: false

# Strict sandbox mode. Forces the container runner (no --no-container fallback),
# restricts the egress allowlist to *.anthropic.com plus the runtime's host
# endpoint, mounts the container rootfs read-only, sets no-new-privileges, and
# attaches the runner to an --internal network so the only route out is the
# scrutineer host proxy. Under podman, each hardened scan first verifies that
# network blocks external egress and refuses to run otherwise. egress_allow
# below is ignored under hardened mode; bundled skills that need ecosyste.ms or
# a package registry won't work unless they route via the host skill API.
# hardened: false

# The non-network half of hardened mode WITHOUT the per-scan --internal network:
# mounts the rootfs read-only, sets no-new-privileges, and applies the 2 GiB
# post-clone workspace cap, but skips the network isolation that rootless podman
# can't route to the host proxy. This is how rootless deployments get hardening,
# since full --hardened is refused there (see docs/podman.md). --cap-drop ALL +
# non-root user + /tmp tmpfs apply in every mode regardless. Implied by hardened.
# A read-only rootfs can break custom profile images that write outside /work
# and /tmp.
# hardened_runtime_only: false

# Container image used for per-scan containers.
# runner_image: ghcr.io/alpha-omega-security/scrutineer-runner:latest

# Directory containing per-ecosystem runner profiles. Each profile is a
# Dockerfile under <dir>/<name>/Dockerfile; the worker auto-detects the
# right profile from the cloned source via `brief` and builds the image
# locally on demand (cache-keyed on the Dockerfile sha). Operators can
# force a profile by passing `profile: <name>` to the API. Empty value
# disables the mechanism entirely.
# profiles_dir: docker/profiles

# Extra hosts the container runner's egress proxy will tunnel to, on top of the
# built-in allowlist (Anthropic API, *.ecosyste.ms, major forges, package
# registries, advisory sources, and the runtime's host endpoint). Use
# "*.example.com" to allow every subdomain.
# egress_allow:
#   - artifactory.internal
#   - "*.mycorp.net"

# How many scans run in parallel. Default is 4; raise on bigger hosts,
# lower if you want model calls serialised.
# concurrency: 4

# Wall-clock limit for one scan. Scans that exceed this are killed and
# marked failed. Go duration syntax ("30m", "1h30m", "2h").
# scan_timeout: 1h

# Global --max-turns passed to claude-code. 0 (default) defers to the
# per-skill value (scrutineer.max_turns in SKILL.md metadata, default 30).
# When set, acts as a fallback for skills that don't declare their own cap.
# max_turns: 0

# Fail a scan when its report.json does not validate against the skill's
# schema.json. Default (false) emits the validator output to the scan log
# and the parser still runs. Turn on while iterating on a skill so shape
# mistakes surface as a scan failure rather than a buried log line.
# schema_strict: false

# Auto-reject open findings if they are not observed in this many
# consecutive rescans of the same repository and subpath. 0 disables.
# auto_reject_missed_count: 0

# Custom Anthropic API base URL. When set, the hostname is automatically
# added to the egress allowlist. Falls back to the ANTHROPIC_BASE_URL
# environment variable when empty.
# anthropic_base_url: https://my-proxy.corp.com/v1

# The model picker in the UI. Replacing this list replaces the built-in
# set (Opus, Sonnet, Fable). Leave it out to keep the built-in list.
# models:
#   - name: Sonnet 4.6
#     id:   claude-sonnet-4-6
#   - name: Sonnet 5.0
#     id:   claude-sonnet-5
#   - name: Opus
#     id:   claude-opus-4-7

# Pin the default model id. When set, this wins over the "first entry
# in models wins" rule for the high tier. The Settings page can map
# each tier (mid, high, max) to a configured model. A skill can declare
# scrutineer.model in SKILL.md metadata as either a tier or exact model,
# and an explicit per-scan model wins over the skill preference.
# default_model: claude-sonnet-4-6

# GitHub organisation the fork skill stages scanned repositories into as
# private repos. Empty disables the fork skill. Also exposed as
# `-fork-org` on the command line; flag wins over this value.
# fork_org: your-security-forks

# Directory inside a staging repo where scrutineer keeps per-project
# metadata (a repo-level metadata.yaml plus one folder per finding).
# Default is `.scrutineer/`. Operators with a consortium-flavoured
# convention can override it (e.g. `.ossprey/`); the scrutineer codebase
# treats it as opaque.
# metadata_dir: .scrutineer/

# Path to a flat text file of public keys (one per line, age X25519 or SSH)
# used to encrypt format=bundle exports. Distribute via a reviewed repo;
# adding/removing a contributor is a one-line commit. Empty disables
# encrypted export.
# recipients_file: ./recipients.txt

# Path to an SSH private key or age identity file (AGE-SECRET-KEY-1...)
# used to decrypt encrypted imports. Passphrase-protected SSH keys are
# supported (prompted on stdin at startup). Mode 0600 recommended. Empty
# disables encrypted import.
# identity_file: ~/.ssh/id_ed25519
