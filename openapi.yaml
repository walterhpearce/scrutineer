openapi: 3.1.0
info:
  title: Scrutineer Skill API
  version: 0.3.0
  description: |
    A narrow HTTP surface that claude-code skills use while they run. The
    goal is enough to let a skill orchestrate other skills and read prior
    scan outputs without pushing that logic into scrutineer's Go code.

    Every scrutineer skill scan is issued a bearer token that is staged into
    the workspace context.json. Skills authenticate with that token. A token
    is only valid while its originating scan is running, and only grants
    access to the repository the scan was issued against.

    The `/v1/*` paths are an unauthenticated, localhost-only export surface
    intended for external scripts (jq, cron, CI dumps). They emit JSONL and
    rely on the same host-header check as the browser UI; see threatmodel.md.

servers:
  - url: http://127.0.0.1:8080/api
    description: Local scrutineer server

security:
  - bearerAuth: []

paths:
  /repositories/{id}:
    get:
      summary: Fetch a repository summary
      operationId: getRepository
      parameters:
        - $ref: '#/components/parameters/RepositoryID'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Repository' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /repositories/{id}/scans:
    get:
      summary: List scans for a repository
      operationId: listRepositoryScans
      parameters:
        - $ref: '#/components/parameters/RepositoryID'
        - name: status
          in: query
          schema:
            type: string
            enum: [queued, running, done, failed]
        - name: skill
          in: query
          schema: { type: string }
          description: Filter by skill name (matches Scan.skill_name).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Scan' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /repositories/{id}/maintainers:
    get:
      summary: List maintainers linked to this repository
      operationId: listRepositoryMaintainers
      parameters:
        - $ref: '#/components/parameters/RepositoryID'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Maintainer' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /repositories/{id}/packages:
    get:
      summary: List published packages produced by this repository
      operationId: listRepositoryPackages
      parameters:
        - $ref: '#/components/parameters/RepositoryID'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Package' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /repositories/{id}/advisories:
    get:
      summary: List published advisories affecting this repository's packages
      operationId: listRepositoryAdvisories
      parameters:
        - $ref: '#/components/parameters/RepositoryID'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Advisory' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /repositories/{id}/dependents:
    get:
      summary: List downstream dependents of this repository's packages
      operationId: listRepositoryDependents
      parameters:
        - $ref: '#/components/parameters/RepositoryID'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Dependent' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /repositories/{id}/dependencies:
    get:
      summary: List dependencies declared by this repository's manifests
      operationId: listRepositoryDependencies
      parameters:
        - $ref: '#/components/parameters/RepositoryID'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Dependency' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /repositories/{id}/findings:
    get:
      summary: List findings across every scan on this repository
      operationId: listRepositoryFindings
      parameters:
        - $ref: '#/components/parameters/RepositoryID'
        - name: severity
          in: query
          schema: { type: string, enum: [Critical, High, Medium, Low] }
        - name: status
          in: query
          schema:
            type: string
            enum: [new, enriched, triaged, ready, reported, acknowledged, fixed, published, rejected, duplicate]
        - name: skill
          in: query
          description: Only return findings produced by scans of this skill (e.g. `semgrep`, `security-deep-dive`).
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/FindingSummary' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /repositories/{id}/dependency-findings:
    get:
      summary: List findings on libraries this repository depends on
      description: >
        Joins this repository's Dependency rows against every Package row
        scrutineer knows about and returns the live findings on the matched
        library repositories. git-pkgs ecosystem names (gem, golang,
        composer) are normalised to packages.ecosyste.ms names (rubygems,
        go, packagist) before matching. Findings already marked fixed,
        rejected or duplicate are excluded. Consumed by the reachability
        skill.
      operationId: listRepositoryDependencyFindings
      parameters:
        - $ref: '#/components/parameters/RepositoryID'
        - name: severity
          in: query
          schema: { type: string, enum: [Critical, High, Medium, Low] }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DependencyFinding' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /repositories/{id}/skills/{name}/run:
    post:
      summary: Enqueue a skill scan against this repository
      operationId: runSkill
      parameters:
        - $ref: '#/components/parameters/RepositoryID'
        - name: name
          in: path
          required: true
          schema: { type: string }
          description: Skill name (matches the SKILL.md `name` field).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                model:
                  type: string
                  description: Override model; defaults to the system default.
                ref:
                  type: string
                  description: Git ref to checkout; empty means the repository's default branch.
                profile:
                  type: string
                  description: |
                    Runner profile name (e.g. `php`). Empty auto-detects from the clone via `brief`;
                    `default` forces the default runner image. Unknown names return 400, as do
                    overrides that conflict with the skill's `requires_profile` constraint.
      responses:
        '201':
          description: Scan enqueued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Scan' }
        '400':
          description: Bad request (unknown profile or profile mismatch with the skill's `requires_profile`)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: Skill or repository not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /findings/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer, format: int64 }
    patch:
      summary: Update mutable fields on a finding
      operationId: patchFinding
      description: |
        Each field value is written through the history-tracked path.
        Skills write with source=model_suggested; the browser UI (behind
        its own session) writes with source=analyst. Unknown field names
        are rejected.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fields]
              properties:
                by:
                  type: string
                  description: Optional author string for the history row.
                fields:
                  type: object
                  additionalProperties: { type: string }
                  description: |
                    Map of field name to new value. Allowed fields:
                    title, severity, status, cwe, location, affected,
                    cve_id, cvss_vector, cvss_v4_vector, fix_version, fix_commit,
                    resolution, disclosure_draft, assignee.
      responses:
        '204': { description: Updated }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /findings/{id}/bundle.tar.gz:
    get:
      summary: Disclosure bundle for one finding
      operationId: getFindingBundle
      description: |
        A gzipped tar containing every per-finding export scrutineer
        produces (OSV, CSAF, markdown report, patch.diff when one is on
        file) plus a manifest.json header naming the finding and the
        archive contents. The per-file bytes are identical to what the
        matching /findings/{id}/{file} endpoint serves directly; the
        bundle is a composition, not a new format. Shape mirrors the
        OSS-SIRT intake brief: one summary line, aliases for
        cross-system identifiers, contents map.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: tar.gz archive.
          content:
            application/gzip:
              schema: { type: string, format: binary }
        '404': { description: Finding not found }
        '410': { description: Finding is a duplicate; bundle unavailable }
        '500': { description: Underlying export failed }

  /findings/{id}/notes:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer, format: int64 }
    get:
      summary: List notes on a finding
      operationId: listFindingNotes
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/FindingNote' }
    post:
      summary: Append a note to a finding
      operationId: addFindingNote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string }
                by:   { type: string }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FindingNote' }

  /findings/{id}/reviews:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer, format: int64 }
    get:
      summary: List structured human verdicts on a finding
      operationId: listFindingReviews
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/FindingReview' }
    post:
      summary: Record one structured human verdict on a finding
      description: |
        Verdicts mirror the revalidate skill's enum so reviewer agreement
        with the model is computed by direct string comparison. When
        automated_outcome is omitted the server snapshots the latest
        revalidate verdict from the finding's notes; explicit values
        win to support older notes the operator wants to re-pin.
      operationId: addFindingReview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [verdict]
              properties:
                verdict:
                  type: string
                  enum: [true_positive, false_positive, already_fixed, uncertain]
                reason: { type: string }
                reviewer: { type: string }
                automated_outcome:
                  type: string
                  description: Optional override for the automation outcome the human is judging. When empty the server pulls it from the finding's latest revalidate note.
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FindingReview' }

  /audit/queue:
    get:
      summary: Sample of recently auto-bucketed findings without a recorded review
      description: |
        Returns findings the automation has bucketed as not worth pursuing
        (low-severity, rejected, or marked by revalidate as false positive,
        already fixed, or uncertain) and that do not yet have a
        FindingReview row. Spot-check the queue to keep automated triage
        calibrated.
      operationId: getAuditQueue
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 500 }
        - name: since
          in: query
          description: RFC3339 timestamp; excludes findings older than this.
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Finding' }

  /audit/metrics:
    get:
      summary: Aggregate audit metrics
      description: |
        Total reviews, those comparable to an automation outcome,
        agreements between human verdict and automation, and the
        agreement rate (0..1). The audit page renders the same numbers.
      operationId: getAuditMetrics
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  TotalReviews: { type: integer }
                  WithAutomatedOutcome: { type: integer }
                  Agreements: { type: integer }
                  AgreementRate: { type: number, format: float }
                  ByVerdict:
                    type: object
                    additionalProperties: { type: integer }

  /findings/{id}/communications:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer, format: int64 }
    get:
      summary: List logged communications for a finding
      operationId: listFindingCommunications
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/FindingCommunication' }
    post:
      summary: Log a communication (sent or received) about a finding
      operationId: addFindingCommunication
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FindingCommunication' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FindingCommunication' }

  /findings/{id}/references:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer, format: int64 }
    get:
      summary: List references attached to a finding
      operationId: listFindingReferences
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/FindingReference' }
    post:
      summary: Attach an external reference to a finding
      operationId: addFindingReference
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FindingReference' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FindingReference' }

  /findings/{id}/labels:
    put:
      summary: Replace the set of labels on a finding
      operationId: setFindingLabels
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [labels]
              properties:
                labels:
                  type: array
                  items: { type: string }
                  description: Label names. Missing labels are created on demand.
      responses:
        '204': { description: Updated }

  /findings/{id}/history:
    get:
      summary: List the history rows recorded for a finding
      operationId: listFindingHistory
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/FindingHistory' }

  /findings/{id}/skills/{name}/run:
    post:
      summary: Enqueue a finding-scoped skill (verify, revalidate, patch, disclose)
      operationId: runFindingSkill
      description: |
        The authenticated scan's repository must own the finding. The scan
        that gets enqueued has FindingID set so its skill body can read
        `scrutineer.finding_id` from context.json and act on one finding
        specifically.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
          description: Finding id.
        - name: name
          in: path
          required: true
          schema: { type: string }
          description: Skill name.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                model: { type: string }
      responses:
        '201':
          description: Scan enqueued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Scan' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: Finding or skill not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /scans/{id}:
    get:
      summary: Fetch a scan with its report (if complete)
      operationId: getScan
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScanDetail' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /findings/{id}:
    get:
      summary: Fetch one finding with its six-step prose
      operationId: getFinding
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FindingDetail' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /skills:
    get:
      summary: List installed skills
      operationId: listSkills
      parameters:
        - name: active
          in: query
          schema: { type: boolean }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/SkillSummary' }

  /cnas:
    get:
      summary: List CVE Numbering Authorities
      description: >
        Cached copy of the cve.org partner list. Global, not repo-scoped.
        Use q to substring-match across short_name, organization, and scope.
      operationId: listCNAs
      parameters:
        - name: q
          in: query
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    short_name:   { type: string }
                    cna_id:       { type: string }
                    organization: { type: string }
                    scope:        { type: string }
                    email:        { type: string }
                    contact_url:  { type: string }
                    policy_url:   { type: string }
                    advisory_url: { type: string }
                    root:         { type: string }
                    types:        { type: string }

  /v1/repositories/{id}/findings:
    get:
      summary: Export findings for a repository as JSONL
      description: |
        Returns one JSON object per line (`application/x-ndjson`). No bearer
        token; localhost-only. Each line is a `FindingExport` carrying the
        full set of `db.Finding` columns.
      operationId: exportRepositoryFindings
      security: []
      parameters:
        - $ref: '#/components/parameters/RepositoryID'
        - name: format
          in: query
          description: Only `jsonl` is supported; other values get a 400.
          schema: { type: string, enum: [jsonl] }
        - name: severity
          in: query
          schema: { type: string, enum: [Critical, High, Medium, Low] }
        - name: status
          in: query
          schema:
            type: string
            enum: [new, enriched, triaged, ready, reported, acknowledged, fixed, published, rejected, duplicate]
      responses:
        '200':
          description: JSONL stream of FindingExport objects, one per line.
          content:
            application/x-ndjson:
              schema: { $ref: '#/components/schemas/FindingExport' }
        '400':
          description: Unsupported format query value
        '403':
          description: Host header is not localhost
        '404':
          description: Repository not found

  /v1/findings:
    get:
      summary: Export findings across all repositories as JSONL
      description: |
        Returns one JSON object per line (`application/x-ndjson`). No bearer
        token; localhost-only. Each line is a `FindingExport` carrying the
        full set of `db.Finding` columns.
      operationId: exportFindings
      security: []
      parameters:
        - name: format
          in: query
          schema: { type: string, enum: [jsonl] }
        - name: severity
          in: query
          schema: { type: string, enum: [Critical, High, Medium, Low] }
        - name: status
          in: query
          schema:
            type: string
            enum: [new, enriched, triaged, ready, reported, acknowledged, fixed, published, rejected, duplicate]
      responses:
        '200':
          description: JSONL stream of FindingExport objects, one per line.
          content:
            application/x-ndjson:
              schema: { $ref: '#/components/schemas/FindingExport' }
        '400':
          description: Unsupported format query value
        '403':
          description: Host header is not localhost

  /v1/scans:
    get:
      summary: Export scans across all repositories as JSONL
      description: |
        Returns one JSON object per line (`application/x-ndjson`). No bearer
        token; localhost-only. Each line is a `ScanExport` carrying the full
        set of `db.Scan` columns minus `api_token` (the per-scan bearer must
        not leak through an unauthenticated channel).
      operationId: exportScans
      security: []
      parameters:
        - name: format
          in: query
          schema: { type: string, enum: [jsonl] }
        - name: status
          in: query
          schema: { type: string, enum: [queued, running, done, failed] }
        - name: skill
          in: query
          schema: { type: string }
      responses:
        '200':
          description: JSONL stream of ScanExport objects, one per line.
          content:
            application/x-ndjson:
              schema: { $ref: '#/components/schemas/ScanExport' }
        '400':
          description: Unsupported format query value
        '403':
          description: Host header is not localhost

  /v1/import:
    post:
      summary: Import externally-produced findings
      description: |
        Ingests a SARIF 2.1.0 document, a minimal JSON report, a findings
        CSV export, or a findings markdown export and creates Finding rows
        under a synthetic `Kind: import` scan. The format is sniffed from
        the body. The repository is taken from the body's own provenance
        (SARIF `versionControlProvenance`, the minimal-JSON `repository`
        field, the CSV `Repository` column, the markdown location link);
        when absent the caller must pass `?repo=`. Re-importing the same
        report dedupes by fingerprint and bumps `seen_count` rather than
        inserting duplicates. A body matching no supported format is
        routed to the `ingest` skill instead when `?repo=` is supplied:
        the raw payload is staged into the skill workspace and a scan is
        queued, returning 202 with the scan id. No bearer token;
        localhost-only. See docs/import.md for the per-format field
        mapping.
      operationId: importFindings
      security: []
      parameters:
        - name: repo
          in: query
          description: Repository URL to attribute findings to. Overrides any provenance in the body.
          schema: { type: string, format: uri }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/ImportMinimal'
                - description: SARIF 2.1.0 document (see sarif-2.1.0 schema).
                  type: object
          text/csv:
            schema:
              type: string
              description: Header row must contain Severity, Repository, Name, Description.
          text/markdown:
            schema:
              type: string
              description: One H1 per finding with H2 sections and a `**Key:** value` metadata block.
      responses:
        '201':
          description: Findings created and/or re-observed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImportResponse' }
        '202':
          description: Unrecognised format routed to the ingest skill; a scan is queued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  format: { type: string, enum: [unrecognised] }
                  repository_id: { type: integer }
                  repository: { type: string }
                  scan_id: { type: integer }
                  skill: { type: string, enum: [ingest] }
                  status: { type: string, enum: [queued] }
        '400':
          description: Body unreadable or empty
        '403':
          description: Host header is not localhost
        '413':
          description: Body exceeds 16 MiB
        '422':
          description: Unrecognised format without `?repo=` (or with the ingest skill unavailable), recognised format that fails to parse, or repository unknown

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  parameters:
    RepositoryID:
      name: id
      in: path
      required: true
      schema: { type: integer, format: int64 }

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Token does not grant access to this resource
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }

    Repository:
      type: object
      required: [id, url, name]
      properties:
        id:             { type: integer, format: int64 }
        url:            { type: string, format: uri }
        name:           { type: string }
        full_name:      { type: string }
        default_branch: { type: string }
        html_url:       { type: string }
        stars:          { type: integer }
        forks:          { type: integer }
        archived:       { type: boolean }
        languages:      { type: string, description: Comma-joined language names. }
        license:        { type: string }
        fork:           { type: string, description: 'owner/name of the staging fork in fork_org, when one exists.' }
        posture:        { type: string, enum: [ready, partial, unprepared], description: 'Disclosure-readiness tier from the posture skill. Empty when posture has not run.' }
        posture_summary: { type: string }

    Scan:
      type: object
      required: [id, kind, status, repository_id]
      properties:
        id:            { type: integer, format: int64 }
        repository_id: { type: integer, format: int64 }
        kind:          { type: string }
        status:        { type: string, enum: [queued, running, done, failed] }
        model:         { type: string }
        commit:        { type: string }
        skill_name:    { type: string }
        skill_version: { type: integer }
        started_at:    { type: string, format: date-time, nullable: true }
        finished_at:   { type: string, format: date-time, nullable: true }
        error:         { type: string }

    ScanDetail:
      allOf:
        - $ref: '#/components/schemas/Scan'
        - type: object
          properties:
            report: { type: string, description: Raw output report (may be JSON text). }
            log:    { type: string }

    Maintainer:
      type: object
      required: [id, login]
      properties:
        id:     { type: integer, format: int64 }
        login:  { type: string }
        name:   { type: string }
        email:  { type: string }
        status: { type: string, enum: [active, inactive, unknown] }
        notes:  { type: string }

    Package:
      type: object
      required: [id, name, ecosystem]
      properties:
        id:                 { type: integer, format: int64 }
        name:               { type: string }
        ecosystem:          { type: string }
        purl:               { type: string }
        latest_version:     { type: string }
        downloads:          { type: integer, format: int64 }
        dependent_packages: { type: integer }
        dependent_repos:    { type: integer }
        registry_url:       { type: string }
        latest_release_at:  { type: string, format: date-time, nullable: true }

    Advisory:
      type: object
      required: [id]
      properties:
        id:             { type: integer, format: int64 }
        uuid:           { type: string }
        url:            { type: string }
        title:          { type: string }
        severity:       { type: string }
        cvss_score:     { type: number }
        classification: { type: string }
        packages:       { type: string, description: Comma-joined affected package names. }
        published_at:   { type: string, format: date-time, nullable: true }
        withdrawn_at:   { type: string, format: date-time, nullable: true }

    Dependent:
      type: object
      required: [id, name, ecosystem]
      properties:
        id:              { type: integer, format: int64 }
        name:            { type: string }
        ecosystem:       { type: string }
        purl:            { type: string }
        repository_url:  { type: string }
        downloads:       { type: integer, format: int64 }
        dependent_repos: { type: integer }
        registry_url:    { type: string }
        latest_version:  { type: string }

    Dependency:
      type: object
      required: [id, name, ecosystem]
      properties:
        id:              { type: integer, format: int64 }
        name:            { type: string }
        ecosystem:       { type: string }
        purl:            { type: string }
        requirement:     { type: string }
        dependency_type: { type: string, description: 'Normalised phase: runtime, dev, test, build, or an unrecognised source value.' }
        manifest_path:   { type: string }
        manifest_kind:   { type: string }

    DependencyFinding:
      type: object
      required: [package, ecosystem, finding_id, library_repository_id, severity]
      properties:
        package:               { type: string }
        ecosystem:             { type: string }
        requirement:           { type: string }
        manifest_path:         { type: string }
        dependency_type:       { type: string, description: 'Normalised phase: runtime, dev, test, build, or an unrecognised source value.' }
        finding_id:            { type: integer, format: int64 }
        library_repository_id: { type: integer, format: int64 }
        library_repository_url: { type: string, format: uri }
        title:                 { type: string }
        severity:              { type: string, enum: [Critical, High, Medium, Low] }
        cwe:                   { type: string }
        location:              { type: string, description: file:line inside the library }
        sinks:                 { type: string }
        status:                { type: string }
        trace:                 { type: string }
        boundary:              { type: string }

    FindingSummary:
      type: object
      required: [id, scan_id, repository_id, severity, location]
      properties:
        id:            { type: integer, format: int64 }
        scan_id:       { type: integer, format: int64 }
        repository_id: { type: integer, format: int64 }
        finding_id:    { type: string, description: Short id within the scan report (F1, F2, ...). }
        sinks:         { type: string, description: Comma-joined sink ids. }
        title:         { type: string }
        severity:      { type: string, enum: [Critical, High, Medium, Low] }
        status:        { type: string }
        cwe:           { type: string }
        location:      { type: string }
        vid:           { type: string, description: "Code identifier (VID-...) hashed from the sink code at the scanned commit; correlates findings across tools. Empty when not computed." }
        affected:      { type: string }
        reachability:  { type: string, enum: [reachable, harness_only, unclear] }
        quality_tier:  { type: string, enum: [high, low] }
        cve_id:        { type: string }
        cvss_vector:    { type: string, description: "CVSS v3.x base vector (3.0 or 3.1)." }
        cvss_score:     { type: number, description: "Base score derived from cvss_vector." }
        cvss_v4_vector: { type: string, description: "CVSS v4.0 base vector. Independent of cvss_vector; both may be populated." }
        cvss_v4_score:  { type: number, description: "Base score derived from cvss_v4_vector." }
        fix_version:   { type: string }
        fix_commit:    { type: string }
        resolution:    { type: string, enum: [fix, migrate, workaround, adopt, wontfix, ""] }
        assignee:      { type: string }
        exploited_in_wild: { type: string, enum: [yes, no, ""], description: "Analyst's call on whether this finding is being exploited in the wild. Empty means unknown. Automation never sets this." }
        exploited_in_wild_evidence: { type: string }
        mitigation:    { type: string, description: "Markdown body of operational mitigation guidance from the mitigate skill: workarounds, detection, optionally a semgrep rule (see mitigation_semgrep)." }
        mitigation_semgrep: { type: string, description: "Optional YAML semgrep rule from the mitigate skill. Empty when no rule was warranted." }

    FindingDetail:
      allOf:
        - $ref: '#/components/schemas/FindingSummary'
        - type: object
          description: Adds the six-step narrative and disclosure draft text.
          properties:
            trace:            { type: string }
            boundary:         { type: string }
            validation:       { type: string }
            prior_art:        { type: string }
            reach:            { type: string }
            rating:           { type: string }
            disclosure_draft: { type: string }

    FindingExport:
      description: |
        Full db.Finding row used by the unauthenticated JSONL export. Adds
        the dedup, denormalised, and timestamp columns that the bearer-only
        FindingDetail leaves out.
      allOf:
        - $ref: '#/components/schemas/FindingDetail'
        - type: object
          properties:
            commit:            { type: string }
            sub_path:          { type: string }
            fingerprint:       { type: string }
            last_seen_scan_id: { type: integer, format: int64 }
            last_seen_commit:  { type: string }
            seen_count:        { type: integer }
            created_at:        { type: string, format: date-time }
            updated_at:        { type: string, format: date-time }

    ImportMinimal:
      description: |
        Minimal hand-written ingest shape for findings that came from a
        pentest writeup or a tool with no SARIF emitter.
      type: object
      required: [findings]
      properties:
        repository: { type: string, format: uri }
        commit:     { type: string }
        tool:       { type: string, description: "Producer name; defaults to 'manual'." }
        findings:
          type: array
          items:
            type: object
            properties:
              title:       { type: string }
              description: { type: string }
              severity:    { type: string, enum: [critical, high, medium, low] }
              confidence:  { type: string, enum: [high, medium, low] }
              cwe:         { type: string }
              location:    { type: string, description: "path[:line[:col]]" }
              patch:       { type: string, description: "unified diff" }

    ImportResponse:
      type: object
      properties:
        format: { type: string, enum: [sarif, minimal, csv, markdown] }
        results:
          type: array
          items:
            type: object
            properties:
              repository_id: { type: integer, format: int64 }
              repository:    { type: string, format: uri }
              scan_id:       { type: integer, format: int64 }
              tool:          { type: string }
              created:       { type: integer }
              observed:      { type: integer }
              finding_ids:
                type: array
                items: { type: integer, format: int64 }

    ScanExport:
      description: |
        Full db.Scan row used by the unauthenticated JSONL export, minus
        api_token.
      allOf:
        - $ref: '#/components/schemas/ScanDetail'
        - type: object
          properties:
            skill_id:           { type: integer, format: int64, nullable: true }
            finding_id:         { type: integer, format: int64, nullable: true }
            sub_path:           { type: string }
            cost_usd:           { type: number }
            turns:              { type: integer }
            input_tokens:       { type: integer }
            output_tokens:      { type: integer }
            cache_read_tokens:  { type: integer }
            cache_write_tokens: { type: integer }
            prompt:             { type: string }
            findings_count:     { type: integer }
            created_at:         { type: string, format: date-time }
            updated_at:         { type: string, format: date-time }

    FindingNote:
      type: object
      required: [id, finding_id, body]
      properties:
        id:         { type: integer, format: int64 }
        finding_id: { type: integer, format: int64 }
        body:       { type: string }
        by:         { type: string }
        created_at: { type: string, format: date-time }

    FindingReview:
      type: object
      required: [id, finding_id, verdict]
      properties:
        id:                { type: integer, format: int64 }
        finding_id:        { type: integer, format: int64 }
        verdict:           { type: string, enum: [true_positive, false_positive, already_fixed, uncertain] }
        reason:            { type: string }
        automated_outcome: { type: string, description: Automation verdict snapshotted at review time, empty when no revalidate run had spoken. }
        reviewer:          { type: string }
        created_at:        { type: string, format: date-time }

    FindingCommunication:
      type: object
      required: [channel, direction, actor]
      properties:
        id:           { type: integer, format: int64 }
        finding_id:   { type: integer, format: int64 }
        channel:      { type: string, enum: [email, ghsa, issue, pr, direct, registry] }
        direction:    { type: string, enum: [outbound, inbound] }
        actor:        { type: string }
        body:         { type: string }
        offered_help: { type: string, enum: [pr, funding, adoption, "none", ""] }
        at:           { type: string, format: date-time }
        created_at:   { type: string, format: date-time }

    FindingReference:
      type: object
      required: [url]
      properties:
        id:         { type: integer, format: int64 }
        finding_id: { type: integer, format: int64 }
        url:        { type: string, format: uri }
        tags:       { type: string, description: Comma-joined tags (issue, pr, cve, ghsa, patch, advisory, discussion, article). }
        summary:    { type: string }
        created_at: { type: string, format: date-time }

    FindingHistory:
      type: object
      required: [id, finding_id, field, new_value, source]
      properties:
        id:         { type: integer, format: int64 }
        finding_id: { type: integer, format: int64 }
        field:      { type: string }
        old_value:  { type: string }
        new_value:  { type: string }
        source:     { type: string, enum: [tool, model_suggested, analyst] }
        by:         { type: string }
        created_at: { type: string, format: date-time }

    SkillSummary:
      type: object
      required: [id, name, description]
      properties:
        id:          { type: integer, format: int64 }
        name:        { type: string }
        description: { type: string }
        output_kind: { type: string }
        output_file: { type: string }
        version:     { type: integer }
        active:      { type: boolean }
